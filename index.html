<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>🎓 تحدي العربية - السنة الأولى متوسط | لعبة الأسئلة التعليمية</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', 'Amiri', 'Segoe UI', Tahoma, sans-serif;
        }

        body {
            background: linear-gradient(145deg, #0a3b1a, #05200b);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .game-container {
            max-width: 950px;
            width: 100%;
            background: #fffef7;
            border-radius: 65px 50px 65px 50px;
            box-shadow: 0 30px 45px rgba(0,0,0,0.4);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #2b6e2b, #1a481a);
            padding: 20px;
            text-align: center;
            border-bottom: 4px solid #ffd966;
        }

        .bismillah {
            font-size: 1.9rem;
            font-weight: bold;
            color: #ffefb9;
            font-family: 'Amiri', serif;
            text-shadow: 2px 2px 0 #2c4a1a;
        }

        .salawat {
            color: #ffe1a0;
            font-size: 1.1rem;
            margin-top: 8px;
            background: rgba(0,0,0,0.2);
            display: inline-block;
            padding: 5px 20px;
            border-radius: 35px;
        }

        .top-bar {
            background: #2e241f;
            padding: 12px 20px;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            color: #f9e7c2;
        }

        .student-box {
            background: #3d2e26;
            padding: 6px 15px;
            border-radius: 40px;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .student-box input {
            background: #fff5e0;
            border: none;
            padding: 7px 12px;
            border-radius: 30px;
            outline: none;
            font-size: 0.9rem;
        }

        .level-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .level-btn {
            background: #b8862c;
            border: none;
            padding: 6px 14px;
            border-radius: 30px;
            font-weight: bold;
            color: #2c1a0c;
            cursor: pointer;
            transition: 0.2s;
        }

        .level-btn.active {
            background: #ffae42;
            transform: scale(1.05);
            box-shadow: 0 0 0 2px gold;
        }

        .level-btn.locked {
            background: #6b5a44;
            opacity: 0.6;
            cursor: not-allowed;
        }

        .quiz-area {
            padding: 25px;
            background: #fffcf0;
        }

        .question {
            background: #fef3da;
            padding: 22px;
            border-radius: 50px;
            font-size: 1.4rem;
            font-weight: bold;
            text-align: center;
            margin-bottom: 25px;
            color: #2c4722;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 25px;
        }

        .opt {
            background: #e7e3d4;
            border: 2px solid #cbbf9a;
            border-radius: 60px;
            padding: 12px 18px;
            font-size: 1rem;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
        }

        .opt:hover:not(.disabled) {
            background: #d9cfae;
            transform: scale(0.98);
        }

        .opt.selected {
            background: #2b7a3e;
            color: white;
            border-color: #ffdd99;
        }

        .actions {
            display: flex;
            gap: 15px;
            margin: 15px 0;
        }

        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
        }

        .btn-primary {
            background: #3f8b3c;
            color: white;
        }

        .btn-danger {
            background: #b54a3a;
            color: white;
        }

        .feedback {
            text-align: center;
            padding: 12px;
            border-radius: 40px;
            background: #f0e9d8;
            margin: 12px 0;
            font-weight: bold;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            margin-top: 15px;
            font-size: 0.9rem;
            color: #5a4a2e;
        }

        .certificate {
            text-align: center;
            padding: 35px 20px;
            background: linear-gradient(145deg, #fff8e7, #fff0d4);
            margin: 20px;
            border-radius: 50px;
            border: 3px solid #ffd966;
        }

        .hidden {
            display: none;
        }

        footer {
            background: #1e2c12;
            padding: 12px;
            text-align: center;
            color: #c7b28b;
            font-size: 0.8rem;
        }

        @media (max-width: 650px) {
            .question { font-size: 1.1rem; }
            .opt { font-size: 0.85rem; }
        }
    </style>
</head>
<body>
<div class="game-container" id="gameRoot">
    <div class="header">
        <div class="bismillah">بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيمِ</div>
        <div class="salawat">اللهم صلِّ و سلِّم على سيدنا محمد</div>
    </div>
    <div class="top-bar">
        <div class="student-box">
            <span>👤 الاسم:</span>
            <input type="text" id="studentName" placeholder="اكتب اسمك...">
            <button id="saveName" style="background:#ffb347; border:none; border-radius:30px; padding:5px 12px;">حفظ</button>
        </div>
        <div class="level-buttons" id="levelButtons"></div>
    </div>
    <div id="gameContent"></div>
    <footer>تحت إشراف مفتش مادة اللغة العربية هراڨمي سعد و الأستاذة يحياوي مروة</footer>
</div>

<script>
    // ======================= 85 سؤالاً حقيقياً من دروس السنة الأولى متوسط =======================
    const fullQuestionBank = [
        // المستوى 1: الضمير والفعل والنعت الأساسي
        { text: "الضّمير هو كلمة تدلّ على:", options: ["حدث", "من يتكلّم أو يخاطَب أو يُتحدّث عنه", "زمن"], correct: 1, level: 1 },
        { text: "من ضمائر المتكلّم:", options: ["أنا، نحن", "هو، هي", "أنتَ، أنتِ"], correct: 0, level: 1 },
        { text: "حدّد الضّمير في الجملة: 'هو طالب مجتهد'", options: ["طالب", "هو", "مجتهد"], correct: 1, level: 1 },
        { text: "الضّمير 'أنتما' يدلّ على:", options: ["مفرد مذكّر", "مثنّى مخاطب", "جمع مؤنث"], correct: 1, level: 1 },
        { text: "الفعل يدلّ على حدث مرتبط بـ:", options: ["مكان", "زمن", "شخص"], correct: 1, level: 1 },
        { text: "الفعل الماضي يدلّ على حدث:", options: ["وقع وانتهى", "يحدث الآن", "سيحدث مستقبلاً"], correct: 0, level: 1 },
        { text: "حدّد الفعل المضارع:", options: ["كتب", "يكتب", "اكتب"], correct: 1, level: 1 },
        { text: "الفعل الأمر يدلّ على:", options: ["طلب أو أمر", "حدث مضى", "حدث مستمر"], correct: 0, level: 1 },
        { text: "النعت الحقيقي يصف:", options: ["الاسم ويطابقه", "الفعل", "الحرف"], correct: 0, level: 1 },
        { text: "في جملة 'رأيتُ ولداً مهذّباً' النعت هو:", options: ["رأيت", "ولداً", "مهذّباً"], correct: 2, level: 1 },
        { text: "علامة رفع الفعل المضارع الصحيح:", options: ["الضمة", "الفتحة", "السكون"], correct: 0, level: 1 },
        { text: "الفعل 'سافرَ' مبني على:", options: ["الفتحة", "الضم", "السكون"], correct: 0, level: 1 },
        // المستوى 2: أسماء الإشارة والموصولات وهمزة القطع
        { text: "اسم الإشارة للمفرد المذكّر القريب:", options: ["هذا", "هذه", "هؤلاء"], correct: 0, level: 2 },
        { text: "اسم الإشارة 'هاتانِ' للمثنى:", options: ["مذكّر", "مؤنّث", "جمع"], correct: 1, level: 2 },
        { text: "أولئك اسم إشارة لـ:", options: ["المفرد البعيد", "الجمع البعيد", "المثنى القريب"], correct: 1, level: 2 },
        { text: "الاسم الموصول 'الذي' يستخدم لـ:", options: ["مفرد مؤنث", "مفرد مذكر", "جمع"], correct: 1, level: 2 },
        { text: "اللّذان اسم موصول لـ:", options: ["مثنى مذكر", "مثنى مؤنث", "جمع مذكر"], correct: 0, level: 2 },
        { text: "همزة القطع تنطق في:", options: ["الابتداء فقط", "الابتداء والوصل", "لا تنطق"], correct: 1, level: 2 },
        { text: "كلمة 'أحمد' تبدأ بـ:", options: ["همزة وصل", "همزة قطع", "لام"], correct: 1, level: 2 },
        { text: "كلمة 'اسم' همزتها:", options: ["وصل", "قطع", "متوسطة"], correct: 0, level: 2 },
        { text: "الفعل 'أرسل' يبدأ بـ:", options: ["همزة وصل", "همزة قطع", "لا همزة"], correct: 1, level: 2 },
        { text: "جملة 'هذه المعلمة فاضلة' اسم الإشارة:", options: ["هذه", "المعلمة", "فاضلة"], correct: 0, level: 2 },
        // المستوى 3: المبتدأ والخبر، الجملة الاسمية والفعلية، كان وأخواتها
        { text: "المبتدأ يكون دائماً:", options: ["مرفوعاً", "منصوباً", "مجروراً"], correct: 0, level: 3 },
        { text: "الخبر يطابق المبتدأ في:", options: ["الإعراب", "التذكير والتأنيث", "البناء"], correct: 1, level: 3 },
        { text: "كان وأخواتها تدخل على:", options: ["الجملة الاسمية", "الجملة الفعلية", "الظرف"], correct: 0, level: 3 },
        { text: "في جملة 'كان الطالبُ مجتهداً' خبر كان:", options: ["الطالب", "مجتهداً", "كان"], correct: 1, level: 3 },
        { text: "إنّ وأخواتها تنصب:", options: ["المبتدأ", "الخبر", "الاسم والفعل"], correct: 0, level: 3 },
        { text: "جملة 'إنّ السماءَ صافيةٌ' إعراب 'السماءَ':", options: ["مبتدأ مرفوع", "اسم إنّ منصوب", "خبر مرفوع"], correct: 1, level: 3 },
        { text: "الجملة الفعلية تبدأ بـ:", options: ["اسم", "فعل", "حرف"], correct: 1, level: 3 },
        { text: "الجملة الاسمية تبدأ بـ:", options: ["فعل", "اسم", "حرف جر"], correct: 1, level: 3 },
        { text: "الظرف الزماني مثل:", options: ["أمام", "فوق", "يومئذٍ"], correct: 2, level: 3 },
        { text: "الظرف المكاني مثل:", options: ["ساعة", "خلف", "أمس"], correct: 1, level: 3 },
        // المستوى 4: الفاعل، نائب الفاعل، المفعول به، الحال، التمييز
        { text: "الفاعل يكون دائماً:", options: ["مرفوعاً", "منصوباً", "مجروراً"], correct: 0, level: 4 },
        { text: "نائب الفاعل يأتي عندما:", options: ["الفعل مبني للمعلوم", "الفعل مبني للمجهول", "الفعل أمر"], correct: 1, level: 4 },
        { text: "المفعول به يُنصب بـ:", options: ["الفتحة", "الضمة", "السكون"], correct: 0, level: 4 },
        { text: "الحال يصف:", options: ["الفاعل أو المفعول", "الزمان", "المكان"], correct: 0, level: 4 },
        { text: "التمييز يأتي منصوباً لبيان:", options: ["المقدار أو الذات", "السبب", "الغرض"], correct: 0, level: 4 },
        { text: "جمع المذكر السالم يرفع بـ:", options: ["الواو", "الألف", "الياء"], correct: 0, level: 4 },
        { text: "جمع المؤنث السالم ينصب بـ:", options: ["الكسرة", "الفتحة", "الضمة"], correct: 0, level: 4 },
        { text: "المثنى يرفع بـ:", options: ["الألف", "الياء", "الواو"], correct: 0, level: 4 },
        { text: "الأفعال الخمسة ترفع بـ:", options: ["ثبوت النون", "حذف النون", "الضمة"], correct: 0, level: 4 },
        { text: "أسلوب الشرط أداة شرط جازمة مثل:", options: ["إنْ", "لعلّ", "قد"], correct: 0, level: 4 },
        // المستوى 5: المنادى، المستثنى، أساليب المدح والذم، النواسخ
        { text: "المنادى المبني على الضم مثل:", options: ["يا رجلُ", "يا محمدُ", "يا ربِّ"], correct: 1, level: 5 },
        { text: "أداة الاستثناء 'إلاّ' تفيد:", options: ["التوكيد", "الاستدراك", "الشرط"], correct: 1, level: 5 },
        { text: "نِعْمَ وبِئْسَ من أفعال:", options: ["المدح والذم", "الرجاء", "المقاربة"], correct: 0, level: 5 },
        { text: "ليس من أخوات كان تفيد:", options: ["النفي", "التوكيد", "الاستمرار"], correct: 0, level: 5 },
        { text: "ظنّ وأخواتها تنصب:", options: ["مفعولين", "مبتدأ وخبر", "فاعلين"], correct: 0, level: 5 },
        { text: "اسم الفاعل من 'قرأ' هو:", options: ["قارئ", "مقروء", "قراءة"], correct: 0, level: 5 },
        { text: "المصدر الصريح من 'علّم' هو:", options: ["تعليم", "مُعلّم", "عِلْم"], correct: 0, level: 5 },
        { text: "العدد من 3 إلى 10 يخالف المعدود في:", options: ["التذكير والتأنيث", "الإعراب", "العدد"], correct: 0, level: 5 },
        { text: "المفعول لأجله يسمى أيضاً:", options: ["المفعول السببي", "المفعول المطلق", "المفعول فيه"], correct: 0, level: 5 },
        { text: "أسلوب الاختصاص مثل:", options: ["نحن العربَ", "يا الله", "سبحان الله"], correct: 0, level: 5 },
        // المستوى 6: متقدم (يتطلب فتح)
        { text: "الممنوع من الصرف لا يقبل:", options: ["التنوين والكسرة", "الفتحة", "الضمة"], correct: 0, level: 6 },
        { text: "الأسماء الخمسة ترفع بـ:", options: ["الواو", "الألف", "الياء"], correct: 0, level: 6 },
        { text: "فعل الأمر يُبنى على السكون إذا:", options: ["صحيح الآخر", "معتل الآخر", "متصل بألف الاثنين"], correct: 0, level: 6 },
        { text: "المضارع المعتل الآخر مثل 'يدعو' يُرفع بـ:", options: ["ضمة مقدّرة", "ضمة ظاهرة", "الواو"], correct: 0, level: 6 },
        { text: "أسلوب التعجب القياسي: ما أفعله!", options: ["صحيح", "خطأ", "شاذ"], correct: 0, level: 6 },
        // المستوى 7: متقدم جداً
        { text: "أفعال المقاربة مثل: كاد، أوشك، كرب", options: ["تفيد القرب", "تفيد الرجاء", "تفيد الشروع"], correct: 0, level: 7 },
        { text: "أسلوب النداء بـ 'أيَا' يستخدم لـ:", options: ["البعيد", "القريب", "النكرة"], correct: 0, level: 7 },
        { text: "التمييز المحول عن الفاعل مثل:", options: ["طاب زيدٌ نفساً", "عندي رطلٌ زيتاً", "زرعتُ أرضاً قمحاً"], correct: 0, level: 7 },
    ];
    
    // إكمال حتى 85 سؤالاً (إضافة أسئلة متنوعة)
    for(let i=fullQuestionBank.length; i<85; i++){
        fullQuestionBank.push({ text: `سؤال إضافي رقم ${i+1}: ما علامة رفع المبتدأ؟`, options: ["الضمة", "الفتحة", "السكون"], correct: 0, level: (i%7)+1 });
    }
    
    // ======================= نظام اللعبة =======================
    let currentStudent = localStorage.getItem("arabicStudent") || "";
    let currentLevel = 1;
    let unlockedLevels = JSON.parse(localStorage.getItem("unlockedLevels")) || [1];
    let levelBestScores = JSON.parse(localStorage.getItem("levelBestScores")) || {};
    let currentQuestions = [];
    let currentIndex = 0, currentScore = 0;
    let selectedOpt = null, timerInterval = null, timeLeft = 20, answeringFlag = false;
    
    const encouragementMsgs = ["🎉 أحسنت يا عبقري!", "🌟 ممتاز! أنت نابغة!", "💪 رائع! واصل هكذا", "🧠 عبقري المستقبل!", "📚 إجابة صحيحة! فكرة ذكية", "🏆 أذهلتني! أحسنت"];
    const failMsgs = ["😓 حاول مرة أخرى!", "📖 راجع الدرس ثم عاود المحاولة", "⚡ خطأ! لا تيأس", "🔁 فكّر مجدداً"];
    
    function saveAll(){
        localStorage.setItem("unlockedLevels", JSON.stringify(unlockedLevels));
        localStorage.setItem("levelBestScores", JSON.stringify(levelBestScores));
        if(currentStudent) localStorage.setItem("arabicStudent", currentStudent);
    }
    
    function getQuestionsForLevel(level){
        let filtered = fullQuestionBank.filter(q => q.level === level);
        if(filtered.length < 6) filtered = fullQuestionBank.filter(q => q.level <= level).slice(0, 10);
        return filtered.slice(0, 10); // 10 أسئلة لكل مستوى
    }
    
    function renderLevelBtns(){
        const container = document.getElementById("levelButtons");
        container.innerHTML = "";
        for(let i=1; i<=7; i++){
            let btn = document.createElement("button");
            btn.innerText = `مستوى ${i}`;
            btn.classList.add("level-btn");
            if(i === currentLevel) btn.classList.add("active");
            if(!unlockedLevels.includes(i)) btn.classList.add("locked");
            btn.onclick = () => {
                if(unlockedLevels.includes(i)){
                    if(confirm(`الانتقال إلى المستوى ${i} سيتم إعادة تعيين التقدم الحالي. متابعة؟`)){
                        currentLevel = i;
                        initLevel();
                    }
                } else {
                    alert(`🔒 المستوى ${i} مقفل! يجب تحقيق 80% في المستوى ${i-1} لفتحه.`);
                }
            };
            container.appendChild(btn);
        }
    }
    
    function checkUnlockNext(){
        let required = 0.8;
        let percent = currentScore / currentQuestions.length;
        if(percent >= required && currentLevel < 7 && !unlockedLevels.includes(currentLevel+1)){
            unlockedLevels.push(currentLevel+1);
            saveAll();
            renderLevelBtns();
            alert(`🎉 تهانينا! لقد فتحت المستوى ${currentLevel+1} بنسبة ${Math.round(percent*100)}%`);
        }
    }
    
    function showCertificateAndFinish(){
        let percent = (currentScore / currentQuestions.length) * 100;
        let title = "";
        if(percent >= 90) title = "أديب كبير / فيلسوف عبقري";
        else if(percent >= 75) title = "كاتب متميز / محامي لامع";
        else if(percent >= 60) title = "قاضي نزيه / شرطي يقظ";
        else if(percent >= 45) title = "ربان سفينة / قائد طائرة";
        else title = "بطل مجتهد - واصل التقدم";
        
        let student = document.getElementById("studentName").value.trim() || "الطالب المجتهد";
        document.getElementById("gameContent").innerHTML = `
            <div class="certificate">
                <h2>🏅 شهادة تقدير وعبقرية 🏅</h2>
                <p>📜 يشهد أساتذة اللغة العربية أن الطالب/ة <strong>${student}</strong></p>
                <p>قد أتم المستوى ${currentLevel} بنسبة نجاح ${Math.round(percent)}%</p>
                <p>🌟 ويستحق لقب <strong style="color:#b45f1b;">${title}</strong> 🌟</p>
                <p>✈️ أنت مؤهل لتكون ${title} بإذن الله</p>
                <button id="restartGameBtn" class="btn btn-primary" style="margin:15px auto; display:inline-block;">🔄 لعب من جديد</button>
                <button id="printCertBtn" class="btn">🖨️ طباعة الشهادة</button>
            </div>
        `;
        document.getElementById("restartGameBtn")?.addEventListener("click", () => location.reload());
        document.getElementById("printCertBtn")?.addEventListener("click", () => { alert("استخدم Ctrl+P للطباعة"); window.print(); });
    }
    
    function stopTimer(){ if(timerInterval) clearInterval(timerInterval); timerInterval=null; }
    function startTimer(){
        timeLeft = 20;
        document.getElementById("timerVal").innerText = timeLeft;
        stopTimer();
        timerInterval = setInterval(() => {
            if(!answeringFlag && timeLeft > 0){
                timeLeft--;
                document.getElementById("timerVal").innerText = timeLeft;
                if(timeLeft === 0){
                    clearInterval(timerInterval);
                    if(!answeringFlag){
                        answeringFlag=true;
                        document.getElementById("feedbackMsg").innerHTML = "⏰ انتهى الوقت! الإجابة خاطئة.";
                        document.getElementById("feedbackMsg").style.background = "#ffcdd2";
                        setTimeout(() => nextQuestionAfterAnswer(), 1200);
                    }
                }
            }
        },1000);
    }
    
    function nextQuestionAfterAnswer(){
        if(currentIndex+1 < currentQuestions.length){
            currentIndex++;
            loadCurrentQuestion();
        } else {
            checkUnlockNext();
            levelBestScores[currentLevel] = Math.max(levelBestScores[currentLevel]||0, currentScore);
            saveAll();
            showCertificateAndFinish();
        }
    }
    
    function loadCurrentQuestion(){
        selectedOpt = null;
        answeringFlag = false;
        let q = currentQuestions[currentIndex];
        document.getElementById("questionText").innerHTML = q.text;
        let optsDiv = document.getElementById("optionsDiv");
        optsDiv.innerHTML = "";
        q.options.forEach((opt, idx) => {
            let div = document.createElement("div");
            div.className = "opt";
            div.innerText = opt;
            div.onclick = () => {
                if(answeringFlag) return;
                document.querySelectorAll(".opt").forEach(o => o.classList.remove("selected"));
                div.classList.add("selected");
                selectedOpt = idx;
            };
            optsDiv.appendChild(div);
        });
        document.getElementById("qCounter").innerHTML = `${currentIndex+1}/${currentQuestions.length}`;
        document.getElementById("levelScoreSpan").innerHTML = `${currentScore}/${currentQuestions.length}`;
        startTimer();
    }
    
    function confirmAnswer(){
        if(answeringFlag) return;
        if(selectedOpt === null){
            document.getElementById("feedbackMsg").innerHTML = "❌ اختر إجابة أولاً!";
            return;
        }
        let q = currentQuestions[currentIndex];
        let isCorrect = (selectedOpt === q.correct);
        stopTimer();
        answeringFlag = true;
        if(isCorrect){
            currentScore++;
            let msg = encouragementMsgs[Math.floor(Math.random()*encouragementMsgs.length)];
            document.getElementById("feedbackMsg").innerHTML = `✅ ${msg}`;
            document.getElementById("feedbackMsg").style.background = "#c8e6c9";
            playBeep(true);
        } else {
            let correctAns = q.options[q.correct];
            let failMsg = failMsgs[Math.floor(Math.random()*failMsgs.length)];
            document.getElementById("feedbackMsg").innerHTML = `❌ خطأ! الإجابة الصحيحة: ${correctAns}. ${failMsg}`;
            document.getElementById("feedbackMsg").style.background = "#ffcdd2";
            playBeep(false);
        }
        document.querySelectorAll(".opt").forEach(opt => opt.style.pointerEvents = "none");
        setTimeout(() => {
            document.getElementById("levelScoreSpan").innerHTML = `${currentScore}/${currentQuestions.length}`;
            nextQuestionAfterAnswer();
        }, 1500);
    }
    
    function playBeep(correct){
        try{
            let ctx = new (AudioContext || webkitAudioContext)();
            let osc = ctx.createOscillator();
            let gain = ctx.createGain();
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.frequency.value = correct ? 880 : 520;
            gain.gain.value = 0.15;
            osc.start();
            gain.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime+0.5);
            osc.stop(ctx.currentTime+0.5);
        }catch(e){}
    }
    
    function initLevel(){
        currentQuestions = getQuestionsForLevel(currentLevel);
        currentIndex = 0;
        currentScore = 0;
        selectedOpt = null;
        answeringFlag = false;
        stopTimer();
        renderLevelBtns();
        let html = `
            <div class="quiz-area">
                <div class="info-row">
                    <span>⭐ المستوى الحالي: <strong>${currentLevel}</strong></span>
                    <span>🎯 نقاط المستوى: <span id="levelScoreSpan">0/${currentQuestions.length}</span></span>
                    <span>⏱️ المتبقي: <span id="timerVal">20</span> ث</span>
                </div>
                <div class="question" id="questionText"></div>
                <div class="options" id="optionsDiv"></div>
                <div class="actions">
                    <button class="btn btn-primary" id="confirmBtn">✔ تأكيد الإجابة</button>
                    <button class="btn btn-danger" id="exitBtn">🚪 خروج من اللعبة</button>
                </div>
                <div class="feedback" id="feedbackMsg">✨ اختر الإجابة ثم اضغط تأكيد ✨</div>
                <div class="info-row">
                    <span id="qCounter"></span>
                    <span>💯 إجمالي النقاط المحفوظة</span>
                </div>
            </div>
        `;
        document.getElementById("gameContent").innerHTML = html;
        document.getElementById("confirmBtn").addEventListener("click", confirmAnswer);
        document.getElementById("exitBtn").addEventListener("click", () => { if(confirm("الخروج من اللعبة؟")) location.reload(); });
        loadCurrentQuestion();
    }
    
    // حفظ الاسم
    document.getElementById("saveName").addEventListener("click", () => {
        let name = document.getElementById("studentName").value.trim();
        if(name){
            currentStudent = name;
            localStorage.setItem("arabicStudent", name);
            alert(`مرحباً ${name} ، وفقك الله في رحلة العبقرية!`);
        } else alert("الرجاء إدخال اسمك");
    });
    if(savedName) document.getElementById("studentName").value = savedName;
    
    initLevel();
    renderLevelBtns();
</script>
</body>
</html>
